name: Washer Notifier 24/7

on:
  schedule:
    - cron: '*/5 * * * *' # Chạy mỗi 5 phút
  workflow_dispatch: # Để bạn bấm nút chạy thử trên web

jobs:
  monitor-washer:
    runs-on: ubuntu-latest
    # Tránh việc nhiều workflow chạy chồng chéo nhau
    concurrency: 
      group: washer-monitor
      cancel-in-progress: true
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Monitoring Script
        env:
          LG_PAT_TOKEN: ${{ secrets.LG_PAT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_washer.py